<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#050510"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.5"/>
  <!-- Brain emoji stylized -->
  <text x="256" y="220" text-anchor="middle" font-size="160" fill="url(#glow)">🧠</text>
  <!-- Lightning -->
  <text x="256" y="360" text-anchor="middle" font-size="80" fill="#00e5ff">⚡</text>
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="#00e5ff" opacity="0.9">BLITZ</text>
  <text x="256" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#ff0080" opacity="0.8">מתמטיקה</text>
</svg>
